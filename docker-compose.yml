services:
  sysaccounts:
    build: .
    container_name: sysaccounts
    pid: "host"
    privileged: true
    ports:
      - "127.0.0.1:${PORT:-9995}:${PORT:-9995}"
    volumes:
      - /etc/passwd:/etc/passwd
      - /etc/shadow:/etc/shadow
      - /etc/group:/etc/group
      - /etc/gshadow:/etc/gshadow
      - /etc/login.defs:/etc/login.defs:ro
      - /etc/sudoers:/etc/sudoers
      - /etc/sudoers.d:/etc/sudoers.d
      - /home:/home
      - /var/run/utmp:/var/run/utmp:ro
      - /var/log/wtmp:/var/log/wtmp:ro
    env_file:
      - .env
    environment:
      - PORT=${PORT:-9995}
      - HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
